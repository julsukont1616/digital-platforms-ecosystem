<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thailand Digital Platform Ecosystem</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F6F6F4;
    --bg-card: #FFFFFF;
    --text-primary: #1A1A1A;
    --text-secondary: #6B6B6B;
    --text-muted: #9B9B9B;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-hover: 0 4px 12px rgba(0,0,0,0.10);
    --shadow-tooltip: 0 4px 16px rgba(0,0,0,0.12);
    --pill-border: #E0E0E0;
    --pill-text: #6B6B6B;
    --badge-opacity: 0.06;
    --label-bg: #FFFFFF;
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --bg: #141416; --bg-card: #1E1E22; --text-primary: #E8E8E8;
      --text-secondary: #8B8B8B; --text-muted: #666666;
      --shadow-card: 0 1px 3px rgba(0,0,0,0.30); --shadow-hover: 0 4px 16px rgba(0,0,0,0.40);
      --shadow-tooltip: 0 4px 16px rgba(0,0,0,0.50);
      --pill-border: #333333; --pill-text: #888888;
      --badge-opacity: 0.12; --label-bg: #1E1E22;
    }
  }
  [data-theme="dark"] {
    --bg: #141416; --bg-card: #1E1E22; --text-primary: #E8E8E8;
    --text-secondary: #8B8B8B; --text-muted: #666666;
    --shadow-card: 0 1px 3px rgba(0,0,0,0.30); --shadow-hover: 0 4px 16px rgba(0,0,0,0.40);
    --shadow-tooltip: 0 4px 16px rgba(0,0,0,0.50);
    --pill-border: #333333; --pill-text: #888888;
    --badge-opacity: 0.12; --label-bg: #1E1E22;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 32px 16px; transition: background 300ms; }
  .container { width: 100%; max-width: 1200px; }
  h1 { font-size: 22px; font-weight: 600; color: var(--text-primary); text-align: center; margin-bottom: 16px; transition: color 300ms; }
  .diagram-svg { width: 100%; max-width: 1200px; display: block; }
  .toggle-bar { display: flex; justify-content: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .flow-pill { font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 400; padding: 6px 16px; border-radius: 20px; border: 1px solid var(--pill-border); background: transparent; color: var(--pill-text); cursor: pointer; transition: background 200ms, color 200ms, border-color 200ms; }
  .flow-pill.active { font-weight: 600; color: #FFFFFF; border-color: transparent; }
  .flow-pill.active::after { content: ''; display: block; width: 16px; height: 2px; background: white; border-radius: 1px; margin: 4px auto 0; animation: fadeIn 200ms ease; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .flow-pill[data-flow="discovery"].active { background: #4285F4; }
  .flow-pill[data-flow="money"].active { background: #0F6E56; }
  .flow-pill[data-flow="physical"].active { background: #BA7517; }
  .flow-pill[data-flow="data"].active { background: #185FA5; }
  .flow-pill[data-flow="overview"].active { background: #6B6B6B; }
  .svg-wrapper { position: relative; }
  .tooltip { position: absolute; background: var(--bg-card); border-radius: 10px; box-shadow: var(--shadow-tooltip); max-width: 220px; padding: 12px 14px; opacity: 0; transition: opacity 150ms, background 300ms; pointer-events: none; z-index: 10; }
  .tooltip.visible { opacity: 1; pointer-events: auto; }
  .tooltip-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
  .tooltip-body { font-size: 11.5px; font-weight: 400; color: var(--text-secondary); line-height: 1.5; }
  .theme-toggle { position: fixed; top: 16px; right: 16px; width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--pill-border); background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 20; transition: background 300ms, border-color 300ms; padding: 0; }
  .theme-toggle svg { width: 16px; height: 16px; fill: var(--text-secondary); transition: fill 300ms; }
  .theme-toggle .icon-moon { display: none; }
  [data-theme="dark"] .theme-toggle .icon-sun { display: none; }
  [data-theme="dark"] .theme-toggle .icon-moon { display: block; }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) .theme-toggle .icon-sun { display: none; }
    :root:not([data-theme="light"]) .theme-toggle .icon-moon { display: block; }
  }
  .footer { text-align: center; font-size: 10px; color: var(--text-muted); margin-top: 16px; line-height: 1.6; transition: color 300ms; }
  .mobile-view { display: none; }
  .mobile-summary { display: none; }
  @media (max-width: 767px) {
    .diagram-svg { display: none; }
    .mobile-view { display: block; }
    .mobile-layer { border-left: 3px solid var(--layer-color, #999); padding-left: 12px; margin-bottom: 16px; }
    .mobile-layer-label { text-transform: uppercase; font-size: 11px; font-weight: 600; color: var(--layer-color, #999); margin-bottom: 4px; letter-spacing: 0.08em; }
    .mobile-node { font-size: 13px; font-weight: 400; color: var(--text-primary); padding: 6px 0; }
    .mobile-summary { font-size: 12px; color: var(--text-secondary); padding: 8px 12px; background: var(--bg-card); border-radius: 8px; margin-top: 8px; line-height: 1.5; display: none; }
    .mobile-summary.active { display: block; }
  }
</style>
</head>

const LAYERS = [
  { index: 0, label: 'PARTICIPANTS',          color: '#534AB7', y: 108 },

  { index: 6, label: 'INTELLIGENCE',          color: '#7C3AED', y: 660 },
  { index: 7, label: 'DIGITAL INFRASTRUCTURE', color: '#185FA5', y: 752 },
];

LAYERS[2].label = 'DISCOVERY & CONTENT';
Object.assign(NODES.browsers, { name: 'Browsers', sub: 'Chrome, Safari, Samsung Internet' });
Object.assign(NODES.search, { x: 50, w: 108 });
Object.assign(NODES.social, { x: 170, w: 108 });
Object.assign(NODES.messaging, { x: 290, w: 108 });
Object.assign(NODES.advertising, { x: 410, w: 108 });
Object.assign(NODES.news, { x: 530, w: 108 });
Object.assign(NODES.streaming, { layer: 2, x: 650, w: 108, y: 292, color: '#4285F4' });
Object.assign(NODES.marketplaces, { x: 50, w: 180 });
Object.assign(NODES.superapps, { x: 300, w: 180 });
Object.assign(NODES.social_commerce, { x: 560, w: 180 });

// --- Remap coordinates: Y for increased gap (36→48), X for wider layout (780→960) ---
(function() {
  var Y0 = 108, NH = 56, OG = 36, NG = 48;
  var OS = NH + OG, NS = NH + NG;
  var SX = 960 / 780;
  function remapY(y) {
    var r = y - Y0; if (r < 0) return y;
    var li = Math.min(7, Math.floor(r / OS)), oLY = Y0 + li * OS, off = y - oLY;
    return off <= NH ? Y0 + li * NS + off : Y0 + li * NS + NH + ((off - NH) / OG) * NG;
  }
  function remapX(x) { return x * SX; }
  window._remapY = remapY;
  window._remapX = remapX;
  Object.values(NODES).forEach(function(n) { n.x = remapX(n.x); n.w = remapX(n.w); n.y = remapY(n.y); });
  LAYERS.forEach(function(l) { l.y = remapY(l.y); });
})();

const svgNS = 'http://www.w3.org/2000/svg';
const nodesLayer = document.getElementById('nodes-layer');

function createSVGEl(tag, attrs) {
  const el = document.createElementNS(svgNS, tag);
  for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
  return el;
}

// Render layer labels with bullet dots
LAYERS.forEach(layer => {
  const dot = createSVGEl('circle', { cx: 54, cy: layer.y - 14, r: 3, fill: layer.color, 'fill-opacity': '0.7' });
  nodesLayer.appendChild(dot);
  const label = createSVGEl('text', {
    x: 64, y: layer.y - 10, 'font-family': 'DM Sans, sans-serif',
    'font-size': '11', 'font-weight': '600', 'letter-spacing': '0.08em',
    fill: layer.color, 'fill-opacity': '0.7',
  });
  label.textContent = layer.label;
  nodesLayer.appendChild(label);
});

// Render node cards
Object.entries(NODES).forEach(([id, n]) => {
  const g = createSVGEl('g', { id: `node-${id}` });
  g.appendChild(createSVGEl('rect', { x: n.x, y: n.y, width: n.w, height: n.h, rx: '8', fill: '#FFFFFF', filter: 'url(#shadow)' }));
  g.appendChild(createSVGEl('rect', { x: n.x, y: n.y, width: '2.5', height: n.h, rx: '1', fill: n.color }));
  const nameEl = createSVGEl('text', { x: n.x + 10, y: n.y + 22, 'font-family': 'DM Sans, sans-serif', 'font-size': '12', 'font-weight': '600', fill: '#1A1A1A' });
  nameEl.textContent = n.name;
  g.appendChild(nameEl);
  const subEl = createSVGEl('text', { x: n.x + 10, y: n.y + 40, 'font-family': 'DM Sans, sans-serif', 'font-size': '10.5', 'font-weight': '400', fill: '#6B6B6B' });
  subEl.textContent = n.sub;
  g.appendChild(subEl);
  nodesLayer.appendChild(g);
});

// Badges removed

// --- Connection renderer ---
function orthoPath(pts, R = 6) {
  if (pts.length < 2) return '';
  let d = `M${pts[0][0]},${pts[0][1]}`;
  for (let i = 1; i < pts.length - 1; i++) {
    const prev = pts[i - 1], curr = pts[i], next = pts[i + 1];
    let rdx1 = curr[0] - prev[0], rdy1 = curr[1] - prev[1];
    let rdx2 = next[0] - curr[0], rdy2 = next[1] - curr[1];
    // Snap near-axis to exact axis: if one delta is < 1px while the other is >= 1px, zero the small one.
    // This eliminates floating-point noise from coordinate remapping that causes Math.sign to
    // return ±1 instead of 0, which would produce diagonal direction vectors and curved approaches.
    if (Math.abs(rdx1) < 1 && Math.abs(rdy1) >= 1) rdx1 = 0;
    else if (Math.abs(rdy1) < 1 && Math.abs(rdx1) >= 1) rdy1 = 0;
    if (Math.abs(rdx2) < 1 && Math.abs(rdy2) >= 1) rdx2 = 0;
    else if (Math.abs(rdy2) < 1 && Math.abs(rdx2) >= 1) rdy2 = 0;
    const dx1 = Math.sign(rdx1), dy1 = Math.sign(rdy1);
    const dx2 = Math.sign(rdx2), dy2 = Math.sign(rdy2);
    const len1 = Math.abs(rdx1) + Math.abs(rdy1);
    const len2 = Math.abs(rdx2) + Math.abs(rdy2);
    const r = Math.min(R, len1 * 0.5, len2 * 0.5);
    d += ` L${curr[0] - dx1 * r},${curr[1] - dy1 * r} Q${curr[0]},${curr[1]} ${curr[0] + dx2 * r},${curr[1] + dy2 * r}`;
  }
  d += ` L${pts[pts.length - 1][0]},${pts[pts.length - 1][1]}`;
  return d;
}

const connLayer = document.getElementById('connections-layer');

// Anchor helpers (third element tags as "already remapped")
function aTop(id)   { const n = NODES[id]; return [n.x + n.w / 2, n.y, 1]; }
function aBot(id)   { const n = NODES[id]; return [n.x + n.w / 2, n.y + n.h, 1]; }
function aLeft(id)  { const n = NODES[id]; return [n.x, n.y + n.h / 2, 1]; }
function aRight(id) { const n = NODES[id]; return [n.x + n.w, n.y + n.h / 2, 1]; }

Object.values(FLOWS).forEach(function(flow) {
  flow.connections.forEach(function(conn) {
    conn.waypoints = conn.waypoints.map(function(pt) {
      return pt.length > 2 ? [pt[0], pt[1]] : [_remapX(pt[0]), _remapY(pt[1])];
    });
  });
});

// Enforce strict orthogonal alignment (bidirectional snap + rounding)
Object.values(FLOWS).forEach(function(flow) {
  flow.connections.forEach(function(conn) {
    var pts = conn.waypoints;
    if (pts.length < 2) return;
    var EPS = 0.5;
    var startX = pts[0][0], startY = pts[0][1];
    var endX = pts[pts.length-1][0], endY = pts[pts.length-1][1];
    // Forward pass
    for (var i = 1; i < pts.length; i++) {
      var dx = Math.abs(pts[i][0] - pts[i-1][0]);
      var dy = Math.abs(pts[i][1] - pts[i-1][1]);
      if (dx > EPS && dy > EPS) {
        if (dx <= dy) pts[i] = [pts[i-1][0], pts[i][1]];
        else          pts[i] = [pts[i][0], pts[i-1][1]];
      }
    }
    pts[pts.length-1] = [endX, endY];
    // Backward pass
    for (var i = pts.length - 2; i >= 0; i--) {
      var dx = Math.abs(pts[i][0] - pts[i+1][0]);
      var dy = Math.abs(pts[i][1] - pts[i+1][1]);
      if (dx > EPS && dy > EPS) {
        if (dx <= dy) pts[i] = [pts[i+1][0], pts[i][1]];
        else          pts[i] = [pts[i][0], pts[i+1][1]];
      }
    }
    pts[0] = [startX, startY];
    // Round to 2dp to eliminate floating-point noise that corrupts Math.sign in orthoPath
    for (var i = 0; i < pts.length; i++) {
      pts[i] = [Math.round(pts[i][0] * 100) / 100, Math.round(pts[i][1] * 100) / 100];
    }
  });
});

    if (conn.dashed) path.setAttribute('stroke-dasharray', '6 4');
    g.appendChild(path);
  });
  connLayer.appendChild(g);
});

let activeFlowName = 'discovery';
const hitLayer = document.getElementById('hit-layer');
const labelLayer = document.getElementById('label-layer');
const svgEl = document.querySelector('.diagram-svg');

function clearChildren(el) { while (el.firstChild) el.removeChild(el.firstChild); }

function labelPosition(waypoints) {
  let maxLen = 0, mx = 0, my = 0;
  for (let i = 0; i < waypoints.length - 1; i++) {
    const [x1, y1] = waypoints[i], [x2, y2] = waypoints[i + 1];
    const len = Math.abs(x2 - x1) + Math.abs(y2 - y1);
    if (len > maxLen) { maxLen = len; mx = (x1 + x2) / 2; my = (y1 + y2) / 2; }
  }
  return [mx, my];
}

function buildInteractionLayers() {
  clearChildren(hitLayer); clearChildren(labelLayer);
  Object.entries(FLOWS).forEach(([name, flow]) => {
    flow.connections.forEach((conn, i) => {
      const connId = `${name}-${i}`;
      const hit = createSVGEl('path', { d: orthoPath(conn.waypoints), stroke: 'transparent', 'stroke-width': '14', fill: 'none', 'pointer-events': 'stroke', class: 'conn-hit', 'data-conn-id': connId, 'data-flow': name, 'data-from': conn.from, 'data-to': conn.to });
      hit.style.display = name === activeFlowName ? '' : 'none';
      hitLayer.appendChild(hit);
      const [lx, ly] = labelPosition(conn.waypoints);
      const lg = createSVGEl('g', { class: 'conn-label', 'data-conn-id': connId, 'data-flow': name });
      lg.style.opacity = '0'; lg.style.transition = 'opacity 150ms'; lg.setAttribute('pointer-events', 'none');
      const lRect = createSVGEl('rect', { rx: '3', fill: '#FFFFFF', stroke: 'none' });
      const lText = createSVGEl('text', { 'text-anchor': 'middle', 'font-family': 'DM Sans, sans-serif', 'font-size': '10', 'font-weight': '500', fill: flow.color, x: lx, y: ly + 3.5 });
      lText.textContent = conn.label;
      lg.appendChild(lRect); lg.appendChild(lText); labelLayer.appendChild(lg);
      requestAnimationFrame(() => {
        const vb = svgEl.viewBox.baseVal; const clampMinX = 12, clampMaxX = vb.width - 12, clampMinY = 12, clampMaxY = vb.height - 12;
        let bbox = lText.getBBox();
        let nextX = parseFloat(lText.getAttribute('x'));
        let nextY = parseFloat(lText.getAttribute('y'));
        if (bbox.x < clampMinX) nextX += clampMinX - bbox.x;
        if (bbox.x + bbox.width > clampMaxX) nextX -= (bbox.x + bbox.width) - clampMaxX;
        if (bbox.y < clampMinY) nextY += clampMinY - bbox.y;
        if (bbox.y + bbox.height > clampMaxY) nextY -= (bbox.y + bbox.height) - clampMaxY;
        lText.setAttribute('x', nextX);
        lText.setAttribute('y', nextY);
        bbox = lText.getBBox();
        lRect.setAttribute('x', bbox.x - 4);
        lRect.setAttribute('y', bbox.y - 2);
        lRect.setAttribute('width', bbox.width + 8);
        lRect.setAttribute('height', bbox.height + 4);
      });
    });
  });
}
buildInteractionLayers();

function highlightConnection(connId, show) {
  const g = document.querySelector(`.flow-${activeFlowName}`);
  if (!g) return;
  g.querySelectorAll('.conn-line').forEach(p => {
    if (show) { const m = p.dataset.connId === connId; p.setAttribute('stroke-width', m ? '2.5' : '1.5'); p.setAttribute('stroke-opacity', m ? '0.85' : '0.08'); p.style.filter = m ? 'url(#conn-glow)' : ''; }
    else { p.setAttribute('stroke-width', '1.5'); p.setAttribute('stroke-opacity', '0.5'); p.style.filter = ''; }
  });
  document.querySelectorAll(`.conn-label[data-conn-id="${connId}"]`).forEach(l => { l.style.opacity = show ? '1' : '0'; });
}

hitLayer.addEventListener('mouseover', e => { const h = e.target.closest('.conn-hit'); if (h) highlightConnection(h.dataset.connId, true); });
hitLayer.addEventListener('mouseout', e => { const h = e.target.closest('.conn-hit'); if (h) highlightConnection(h.dataset.connId, false); });

function highlightNode(nodeId, show) {
  const g = document.querySelector(`.flow-${activeFlowName}`); if (!g) return;
  const touching = new Set();
  g.querySelectorAll('.conn-line').forEach(p => { if (p.dataset.from === nodeId || p.dataset.to === nodeId) touching.add(p.dataset.connId); });
  g.querySelectorAll('.conn-line').forEach(p => {
    if (show) { const m = touching.has(p.dataset.connId); p.setAttribute('stroke-width', m ? '2.2' : '1.5'); p.setAttribute('stroke-opacity', m ? '0.85' : '0.08'); p.style.filter = m ? 'url(#conn-glow)' : ''; }
    else { p.setAttribute('stroke-width', '1.5'); p.setAttribute('stroke-opacity', '0.5'); p.style.filter = ''; }
  });
  touching.forEach(cid => { document.querySelectorAll(`.conn-label[data-conn-id="${cid}"]`).forEach(l => { l.style.opacity = show ? '1' : '0'; }); });
}

Object.keys(NODES).forEach(id => {
  const el = document.getElementById(`node-${id}`); if (!el) return;
  el.style.cursor = 'pointer';
  el.addEventListener('mouseenter', () => highlightNode(id, true));
  el.addEventListener('mouseleave', () => highlightNode(id, false));
});

// Tooltip
const tooltipEl = document.getElementById('tooltip');
const tooltipTitle = document.getElementById('tooltip-title');
const tooltipBody = document.getElementById('tooltip-body');
let openTooltipId = null;

function showTooltip(nodeId) {
  const n = NODES[nodeId]; if (!n || !TOOLTIPS[nodeId]) return;
  tooltipTitle.textContent = n.name; tooltipBody.textContent = TOOLTIPS[nodeId];
  const svgRect = svgEl.getBoundingClientRect();
  const vb = svgEl.viewBox.baseVal; const scaleX = svgRect.width / vb.width, scaleY = svgRect.height / vb.height;
  let tx = (n.x + n.w / 2) * scaleX - 110;
  let ty = (n.y + n.h + 8) * scaleY;
  tx = Math.max(4, Math.min(tx, svgRect.width - 224));
  if (ty + 120 > svgRect.height) ty = (n.y - 8) * scaleY - 100;
  tooltipEl.style.left = tx + 'px'; tooltipEl.style.top = ty + 'px';
  tooltipEl.classList.add('visible'); openTooltipId = nodeId;
}
function hideTooltip() { tooltipEl.classList.remove('visible'); openTooltipId = null; }

Object.keys(NODES).forEach(id => {
  const el = document.getElementById(`node-${id}`); if (!el) return;
  el.addEventListener('click', e => { e.stopPropagation(); if (openTooltipId === id) { hideTooltip(); return; } showTooltip(id); });
});
document.addEventListener('click', () => hideTooltip());

// Draw-in animation
const _origSetFlow = setActiveFlow;
setActiveFlow = function(name) {
  activeFlowName = name;
  document.querySelectorAll('.flow-pill').forEach(btn => { btn.classList.toggle('active', btn.dataset.flow === name); });
  Object.keys(NODES).forEach(id => {
    const el = document.getElementById(`node-${id}`); if (!el) return;
    el.style.opacity = FLOW_NODES[name].includes(id) ? '1' : '0.35';
    el.style.transition = 'opacity 200ms';
  });
  document.querySelectorAll('.flow-group').forEach(g => {
    if (g.classList.contains(`flow-${name}`)) {
      g.style.opacity = '1';
      g.querySelectorAll('.conn-line').forEach(path => {
        const origDash = path.getAttribute('data-orig-dash') || '';
        const len = path.getTotalLength();
        path.style.transition = 'none';
        path.setAttribute('stroke-dasharray', len);
        path.setAttribute('stroke-dashoffset', len);
        requestAnimationFrame(() => { requestAnimationFrame(() => {
          path.style.transition = 'stroke-dashoffset 400ms ease-out';
          path.setAttribute('stroke-dashoffset', '0');
          setTimeout(() => { if (origDash) path.setAttribute('stroke-dasharray', origDash); else path.removeAttribute('stroke-dasharray'); }, 420);
        }); });
      });
    } else { g.style.opacity = '0'; }
  });
  document.querySelectorAll('.conn-hit').forEach(h => { h.style.display = h.dataset.flow === name ? '' : 'none'; });
  hideTooltip();
};

document.querySelectorAll('.conn-line').forEach(p => { const da = p.getAttribute('stroke-dasharray'); if (da) p.setAttribute('data-orig-dash', da); });

// --- Dark mode ---
function toggleTheme() {
  const root = document.documentElement;
  const current = root.getAttribute('data-theme');
  const isDark = current === 'dark' || (!current && window.matchMedia('(prefers-color-scheme: dark)').matches);
  root.setAttribute('data-theme', isDark ? 'light' : 'dark');
  applyThemeToSVG();
}

function applyThemeToSVG() {
  const theme = document.documentElement.getAttribute('data-theme');
  const isDark = theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches);
  const cardFill = isDark ? '#1E1E22' : '#FFFFFF';
  const textPrimary = isDark ? '#E8E8E8' : '#1A1A1A';
  const textSecondary = isDark ? '#8B8B8B' : '#6B6B6B';
  const badgeOpacity = isDark ? '0.12' : '0.06';
  const labelBg = isDark ? '#1E1E22' : '#FFFFFF';
  Object.keys(NODES).forEach(id => {
    const g = document.getElementById(`node-${id}`); if (!g) return;
    const rects = g.querySelectorAll('rect'); if (rects[0]) rects[0].setAttribute('fill', cardFill);
    const texts = g.querySelectorAll('text'); if (texts[0]) texts[0].setAttribute('fill', textPrimary); if (texts[1]) texts[1].setAttribute('fill', textSecondary);
  });
  // badges removed
  document.querySelectorAll('.conn-label rect').forEach(r => { r.setAttribute('fill', labelBg); });
}
