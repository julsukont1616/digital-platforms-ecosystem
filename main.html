let activePlatform = 'shopee';
let currentView = 'summary';
let hoverIdx = null;

function renderNav(){
  const nav = document.getElementById('platformNav');
  const colors = {shopee:'#D85A30',line:'#06C755',google:'#4285F4',meta:'#0081FB',grab:'#00B14F',truecorp:'#E4002B',tiktok:'#333'};
  let h = '';
  Object.keys(DATA).forEach(k => {
    const d = DATA[k];
    const isActive = k === activePlatform;
    const bg = isActive ? colors[k] : 'transparent';
    const bdr = isActive ? colors[k] : '';
    h += `<button class="pnav-btn${isActive?' active':''}" data-p="${k}" style="${isActive?'background:'+bg+';border-color:'+bg:''}">${d.name}</button>`;
  });
  nav.innerHTML = h;
  nav.querySelectorAll('.pnav-btn').forEach(b => {
    b.addEventListener('click', () => {
      activePlatform = b.dataset.p;
      renderNav();
      renderDiagram();
    });
  });
}

function renderDiagram(){
  const d = DATA[activePlatform];
  const cols = document.getElementById('cols');
  let leftH = '<div class="col col-left">';
  d.left.forEach(g => {
    leftH += `<div class="grp" data-group="${g.id}"><div class="grp-bar" style="background:${g.color}"></div><div class="grp-name" style="color:${g.color}">${g.name}</div><div class="grp-desc">${g.desc}</div></div>`;
  });
  leftH += '</div>';

  let centerH = '<div class="col col-center"><div class="hub"><div class="hub-title">' + d.name + (d.parent ? ' <span style="font-weight:400;opacity:0.6">(' + d.parent + ')</span>' : '') + '</div>';
  d.units.forEach(u => {
    centerH += `<div class="unit" data-unit="${u.id}"><div class="unit-name" style="color:${d.color}">${u.name}</div><div class="unit-desc">${u.desc}</div></div>`;
  });
  centerH += `<div class="hub-footer">${d.units.length} units</div></div></div>`;

  let rightH = '<div class="col col-right">';
  d.right.forEach(g => {
    rightH += `<div class="grp" data-group="${g.id}"><div class="grp-bar" style="background:${g.color}"></div><div class="grp-name" style="color:${g.color}">${g.name}</div><div class="grp-desc">${g.desc}</div>`;
    if(g.subs && g.subs.length){
      rightH += '<div class="grp-details'+(currentView==='expanded'?' open':'')+ '">';
      g.subs.forEach(s => {
        if(s.label) rightH += `<div class="grp-sub" style="color:${s.color}">${s.label}</div>`;
        s.items.forEach(it => {
          rightH += `<div class="grp-entity"><span class="d" style="background:${s.color}"></span>${it}</div>`;
        });
      });
      rightH += '</div>';
    }
    rightH += '</div>';
  });
  rightH += '</div>';

  cols.innerHTML = leftH + centerH + rightH;
  attachHover();
  hoverIdx = null;
  setTimeout(drawConns, 30);
  setTimeout(drawConns, 150);
}

function attachHover(){
  document.querySelectorAll('.grp').forEach(g => {
    g.addEventListener('mouseenter', () => {
      const grp = g.dataset.group;
      const d = DATA[activePlatform];
      const rel = d.flows.map((f,i) => (f.fromGrp===grp||f.toGrp===grp)?i:-1).filter(i=>i>=0);
      if(!rel.length) return;
      hoverIdx = -99;
      applyHL(rel);
    });
    g.addEventListener('mouseleave', () => { hoverIdx=null; drawConns(); });
  });
  document.querySelectorAll('.unit').forEach(u => {
    u.addEventListener('mouseenter', () => {
      const unit = u.dataset.unit;
      const d = DATA[activePlatform];
      const rel = d.flows.map((f,i) => (f.fromUnit===unit||f.toUnit===unit)?i:-1).filter(i=>i>=0);
      if(!rel.length) return;
      hoverIdx = -99;
      applyHL(rel);
    });
    u.addEventListener('mouseleave', () => { hoverIdx=null; drawConns(); });
  });
}

function applyHL(rel){
  const svg = document.getElementById('svg');
  svg.querySelectorAll('.conn').forEach((p,i) => {
    p.classList.toggle('hl', rel.includes(i));
    p.classList.toggle('dim', !rel.includes(i));
  });
  svg.querySelectorAll('.ftag-g').forEach((t,i) => t.classList.toggle('show', rel.includes(i)));
}

function setView(v){
  currentView = v;
  document.getElementById('btnSummary').classList.toggle('active', v==='summary');
  document.getElementById('btnExpanded').classList.toggle('active', v==='expanded');
  document.querySelectorAll('.grp-details').forEach(d => {
    if(v==='expanded') d.classList.add('open'); else d.classList.remove('open');
  });
  setTimeout(drawConns, 20); setTimeout(drawConns, 120);
}

function getRect(el){
  const rr = document.getElementById('diagram').getBoundingClientRect();
  const er = el.getBoundingClientRect();
  return {x:er.left-rr.left, y:er.top-rr.top, w:er.width, h:er.height};
}
function anch(el, side){
  const r = getRect(el);
  return side==='right' ? {x:r.x+r.w, y:r.y+r.h/2} : {x:r.x, y:r.y+r.h/2};
}

function drawConns(){
  const svg = document.getElementById('svg');
  const rr = document.getElementById('diagram').getBoundingClientRect();
  svg.setAttribute('viewBox', `0 0 ${rr.width} ${rr.height}`);
  svg.style.width = rr.width+'px';
  svg.style.height = rr.height+'px';
  const defs = svg.querySelector('defs').outerHTML;
  const dark = window.matchMedia('(prefers-color-scheme:dark)').matches;
  const tagFill = dark ? '#2C2C2A' : '#FFFFFF';
  const tagText = dark ? '#E8E6DE' : '#1A1A18';
  const d = DATA[activePlatform];
  let lH = '', labH = '';

  d.flows.forEach((f, i) => {
    let sx,sy,ex,ey;
    if(f.fromGrp){
      const gEl = document.querySelector(`[data-group="${f.fromGrp}"]`);
      const uEl = document.querySelector(`[data-unit="${f.toUnit}"]`);
      if(!gEl||!uEl) return;
      const s = anch(gEl,'right'), e = anch(uEl,'left');
      sx=s.x;sy=s.y;ex=e.x;ey=e.y;
    } else {
      const uEl = document.querySelector(`[data-unit="${f.fromUnit}"]`);
      const gEl = document.querySelector(`[data-group="${f.toGrp}"]`);
      if(!gEl||!uEl) return;
      const s = anch(uEl,'right'), e = anch(gEl,'left');
      sx=s.x;sy=s.y;ex=e.x;ey=e.y;
    }
    const cp = Math.max(Math.abs(ex-sx)*0.45, 30);
    const path = `M${sx},${sy} C${sx+cp},${sy} ${ex-cp},${ey} ${ex},${ey}`;
    const dash = f.dir==='both' ? 'stroke-dasharray="4 2.5"' : '';
    const mStart = f.dir==='both' ? 'marker-start="url(#ah)"' : '';
    const isHl = hoverIdx===i, isDim = hoverIdx!==null && hoverIdx!==i;
    const cls = isHl?'conn hl':isDim?'conn dim':'conn';
    lH += `<path class="${cls}" d="${path}" stroke="${f.color}" ${dash} ${mStart} marker-end="url(#ah)"/>`;
    lH += `<path class="conn-hit" d="${path}" data-fi="${i}"/>`;
    const mx=(sx+ex)/2, my=(sy+ey)/2, tw=f.label.length*5.4+16;
    labH += `<g class="ftag-g${isHl?' show':''}"><rect class="ftag-bg" fill="${tagFill}" x="${mx-tw/2}" y="${my-12}" width="${tw}" height="18" rx="5"/><text class="ftag" fill="${tagText}" x="${mx}" y="${my+2}" text-anchor="middle" dominant-baseline="central">${f.label}</text></g>`;
  });

  svg.innerHTML = defs + lH + labH;
  svg.querySelectorAll('.conn-hit').forEach(p => {
    p.addEventListener('mouseenter', e => {
      hoverIdx = parseInt(p.dataset.fi);
      drawConns();
      showTip(e, d.flows[hoverIdx]);
    });
    p.addEventListener('mousemove', e => moveTip(e));
    p.addEventListener('mouseleave', () => { hoverIdx=null; drawConns(); hideTip(); });
  });
}

function showTip(e, f){
  const tip = document.getElementById('tip');
  const dl = f.dir==='in'?'Inflow':f.dir==='out'?'Outflow':'Bidirectional';
  const dc = f.dir==='in'?'#639922':f.dir==='out'?'#993556':'#0F6E56';
  const db = f.dir==='in'?'rgba(99,153,34,0.12)':f.dir==='out'?'rgba(153,53,86,0.12)':'rgba(15,110,86,0.12)';
  tip.innerHTML = `<div class="tip-title">${f.label}</div><div class="tip-dir" style="background:${db};color:${dc}">${dl}</div><div class="tip-note">${f.note}</div>`;
  tip.classList.add('show');
  moveTip(e);
}
function moveTip(e){
  const tip = document.getElementById('tip');
  const rr = document.getElementById('diagram').getBoundingClientRect();
  let x = e.clientX-rr.left+14, y = e.clientY-rr.top-20;
  if(x+230>rr.width) x -= 244;
  if(y<0) y = 10;
  tip.style.left = x+'px'; tip.style.top = y+'px';
}
function hideTip(){ document.getElementById('tip').classList.remove('show'); }

window.addEventListener('resize', () => drawConns());
window.matchMedia('(prefers-color-scheme:dark)').addEventListener('change', () => drawConns());

renderNav();
renderDiagram();
</script>
